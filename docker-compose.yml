# 小米摄像头视频流水线 v1.2.5
# 压缩质量优化：CRF 32 平衡模式，兼顾质量与压缩率

version: "3.8"

services:
  pipeline:
    build: .
    container_name: xiaomi-camera-pipeline
    restart: unless-stopped
    
    volumes:
      # ========== 视频处理目录 ==========
      # 视频源目录（小米摄像头原始视频）- 修改为你的实际路径
      # 改为 rw 支持删除源文件
      - /path/to/xiaomi/video:/video
      
      # 合并中间文件（MOV 格式）
      - ./temp:/input
      
      # 压缩后文件（MKV 格式）
      - ./output:/output
      
      # 日志目录
      - ./log:/logs
      
      # ========== 配置和数据 ==========
      # 配置文件（只读挂载）
      - ./config.yaml:/app/config.yaml:ro
      
      # 状态数据库目录（v1.2.2 断点续传需要）
      # 使用目录挂载避免权限问题
      - ./data:/app/data
    
    environment:
      - CONFIG_FILE=/app/config.yaml
      - STATE_DB=/app/data/pipeline.db
      - LOG_DIR=/logs
      
      # 时区设置（北京时间）
      - TZ=Asia/Shanghai
      
      # UTF-8 编码设置
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - PYTHONIOENCODING=utf-8
      
      # ========== 压缩参数（环境变量优先级最高）==========
      # 分辨率: original(保持原分辨率), 1920x1080(推荐), 1280x720
      # 监控场景建议 1920x1080 或 1280x720，2K 太奢侈
      - COMPRESS_RESOLUTION=1920x1080
      
      # CRF: 0-51，越小质量越好
      # 推荐值: 28(高质量) / 32(平衡) / 35(高压缩)
      # 默认 32 平衡模式，减少花屏同时保持较好压缩率
      - COMPRESS_CRF=32
      
      # 线程数
      - COMPRESS_THREADS=4
      
      # 预设: ultrafast, superfast, veryfast, fast, medium, slow, slower
      # 速度与质量权衡: faster(快) / fast(平衡) / medium(慢但省空间)
      # 默认 fast 平衡模式，编码时间适中，质量较好
      - COMPRESS_PRESET=fast
    
    deploy:
      resources:
        limits:
          # CPU 限制
          # 根据宿主机配置调整
          # 4核=压缩慢但省电, 8核=压缩快但耗电
          cpus: "8"
          memory: 2G
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
