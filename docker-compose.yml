services:
  pipeline:
    build: .
    container_name: xiaomi-camera-pipeline
    restart: unless-stopped
    
    volumes:
      # 视频源目录（小米摄像头原始视频片段）- 只读
      # 请修改为您的实际路径
      - /path/to/xiaomi/video:/video:ro
      # 合并中间文件目录（MOV 格式）
      - ./temp:/input
      # 压缩后文件目录（MKV 格式）
      - ./output:/output
      # 日志目录
      - ./logs:/logs
      # 配置文件（只读）
      - ./config.yaml:/app/config.yaml:ro
      # 数据目录（包含 SQLite 数据库）
      # 注意：使用目录挂载而非文件挂载，避免权限问题
      - ./data:/app/data
    
    environment:
      - CONFIG_FILE=/app/config.yaml
      - STATE_DB=/app/data/pipeline.db
      - LOG_DIR=/logs
      # 编码设置（避免中文乱码）
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      - PYTHONIOENCODING=utf-8
      # 压缩配置（环境变量优先级最高，会覆盖 config.yaml 中的设置）
      # 建议在此设置主要参数，便于统一管理
      # resolution: original(保持原分辨率), 1920x1080, -2:1080(等高), 1920:-2(等宽)
      - COMPRESS_RESOLUTION=1920x1080
      - COMPRESS_CRF=35
      - COMPRESS_THREADS=4
      - COMPRESS_PRESET=medium
    
    deploy:
      resources:
        limits:
          # CPU 限制（可根据实际情况调整）
          cpus: "4"
          memory: 2G
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
